<script>
const logBox = document.getElementById("logBox");
const runBtn = document.getElementById("runBtn");
let isRunning = false;

/*
==================================================
LOGGING
==================================================
*/
function log(msg){
  const time = new Date().toLocaleTimeString();
  const line = document.createElement("div");
  line.textContent = `[${time}] ${msg}`;
  logBox.appendChild(line);

  if(logBox.children.length > 100){
    logBox.removeChild(logBox.firstChild);
  }
  logBox.scrollTop = logBox.scrollHeight;
}

/*
==================================================
SAFE UI UPDATE
==================================================
*/
function setValue(id, value){
  const el = document.getElementById(id);
  if(el){
    el.innerText = value ?? "--";
  }
}

/*
==================================================
SAVE POSITION
==================================================
*/
async function savePosition(){
  log("Saving position...");
  await runAnalysis(true);
  log("Position saved");
}

/*
==================================================
RUN ANALYSIS
==================================================
*/
async function runAnalysis(updatePosition=false){
  if(isRunning) return;

  try {
    isRunning = true;
    runBtn.disabled = true;
    document.body.classList.add("loading");
    log("Running analysis...");

    const instrumentId = encodeURIComponent(document.getElementById("instrumentInput").value);
    const holding = encodeURIComponent(document.getElementById("holding").value);
    const leverage = encodeURIComponent(document.getElementById("leverage").value);
    const entryPrice = encodeURIComponent(document.getElementById("entryPrice").value || 0);
    const existingSL = encodeURIComponent(document.getElementById("existingSL").value || 0);
    const existingTP = encodeURIComponent(document.getElementById("existingTP").value || 0);
    const amountInvested = encodeURIComponent(document.getElementById("amountInvested").value || 1000);

    const url = `/api/market?instrumentId=${instrumentId}&holding=${holding}&leverage=${leverage}&entryPrice=${entryPrice}&existingSL=${existingSL}&existingTP=${existingTP}&amountInvested=${amountInvested}&updatePosition=${updatePosition}`;

    const response = await fetch(url);
    if(!response.ok){
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();
    if(data.error){
      throw new Error(data.error);
    }

    /*
    ========================================
    UPDATE INPUT FIELDS (FIXES PERSISTENCE ON REFRESH)
    ========================================
    */
    // If we're just loading or doing a routine check, populate the boxes from the database
    if (!updatePosition) {
      document.getElementById("holding").value = data.holding ? "yes" : "no";
      document.getElementById("leverage").value = data.leverage || 1;
      document.getElementById("entryPrice").value = data.entryPrice > 0 ? data.entryPrice : "";
      document.getElementById("amountInvested").value = data.amountInvested > 0 ? data.amountInvested : "";
      document.getElementById("existingSL").value = data.existingSL > 0 ? data.existingSL : "";
      document.getElementById("existingTP").value = data.existingTP > 0 ? data.existingTP : "";
    }

    /*
    ========================================
    SIGNAL VISUALS
    ========================================
    */
    const signalElement = document.getElementById("signal");
    signalElement.innerText = data.signal || "HOLD";
    signalElement.className = `signal ${(data.signal || "hold").toLowerCase()}`;

    /*
    ========================================
    UPDATE DISPLAY VALUES
    ========================================
    */
    setValue("confidence", data.confidence);
    setValue("duration", data.duration);
    setValue("shortTrend", data.shortTrend);
    setValue("midTrend", data.midTrend);
    setValue("longTrend", data.longTrend);
    setValue("price", data.price);
    setValue("ema20", data.ema20);
    setValue("ema50", data.ema50);
    setValue("ema100", data.ema100);
    setValue("rsi", data.rsi);
    setValue("atr", data.atr);
    setValue("spread", data.spread);
    setValue("entry", data.entry);
    setValue("sl", data.stopLoss);
    setValue("tp", data.takeProfit);
    setValue("risk", data.riskScore);
    setValue("pnl", data.pnl);
    setValue("exposure", data.exposure);
    setValue("positionAdvice", data.positionAdvice);

    log("Analysis completed");

  } catch(err) {
    console.error(err);
    log(`ERROR: ${err.message}`);
  } finally {
    isRunning = false;
    runBtn.disabled = false;
    document.body.classList.remove("loading");
  }
}

/*
==================================================
INITIAL LOAD & BACKGROUND INTERVAL
==================================================
*/
runAnalysis(false);

const REFRESH_INTERVAL = 1000 * 60 * 15;
setInterval(() => {
  runAnalysis(false);
}, REFRESH_INTERVAL);
</script>
