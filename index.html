<script>

/*
====================================================
CONFIG
====================================================
*/

const API_KEY = "74544d22ce9d4fe5a6c738e21231706e";

/*
====================================================
ELEMENTS
====================================================
*/

const qqqPriceEl = document.getElementById("qqqPrice");
const ndxPriceEl = document.getElementById("ndxPrice");

const rsiValEl = document.getElementById("rsiVal");
const macdValEl = document.getElementById("macdVal");

const ema20ValEl = document.getElementById("ema20Val");
const ema50ValEl = document.getElementById("ema50Val");

const atrValEl = document.getElementById("atrVal");

const volumeValEl = document.getElementById("volumeVal");

const volatilityValEl = document.getElementById("volatilityVal");

const trendValEl = document.getElementById("trendVal");

const scoreValEl = document.getElementById("scoreVal");

const entryValEl = document.getElementById("entryVal");
const slValEl = document.getElementById("slVal");
const tpValEl = document.getElementById("tpVal");

const rrValEl = document.getElementById("rrVal");

const levValEl = document.getElementById("levVal");

const signalBox = document.getElementById("signalBox");

const marketStateEl = document.getElementById("marketState");

const confidenceBar = document.getElementById("confidenceBar");

const confidenceText = document.getElementById("confidenceText");

const logBox = document.getElementById("logBox");

/*
====================================================
LOGGER
====================================================
*/

function log(message){

    const time = new Date().toLocaleTimeString();

    logBox.innerHTML += `
    <div>[${time}] ${message}</div>
    `;

    logBox.scrollTop = logBox.scrollHeight;
}

/*
====================================================
EMA
====================================================
*/

function EMA(data, period){

    const k = 2 / (period + 1);

    let ema = data[0];

    for(let i = 1; i < data.length; i++){

        ema = data[i] * k + ema * (1 - k);
    }

    return ema;
}

/*
====================================================
RSI
====================================================
*/

function RSI(closes, period = 14){

    let gains = 0;
    let losses = 0;

    for(let i = closes.length - period; i < closes.length - 1; i++){

        const diff = closes[i + 1] - closes[i];

        if(diff > 0){
            gains += diff;
        }else{
            losses += Math.abs(diff);
        }
    }

    const avgGain = gains / period;
    const avgLoss = losses / period;

    if(avgLoss === 0){
        return 100;
    }

    const rs = avgGain / avgLoss;

    return 100 - (100 / (1 + rs));
}

/*
====================================================
ATR
====================================================
*/

function ATR(highs, lows, closes, period = 14){

    let trs = [];

    for(let i = 1; i < closes.length; i++){

        const tr = Math.max(
            highs[i] - lows[i],
            Math.abs(highs[i] - closes[i - 1]),
            Math.abs(lows[i] - closes[i - 1])
        );

        trs.push(tr);
    }

    const recent = trs.slice(-period);

    return recent.reduce((a,b)=>a+b,0) / period;
}

/*
====================================================
MACD
====================================================
*/

function MACD(closes){

    const ema12 = EMA(closes.slice(-12),12);

    const ema26 = EMA(closes.slice(-26),26);

    return ema12 - ema26;
}

/*
====================================================
VOLUME ANALYSIS
====================================================
*/

function volumeTrend(volumes){

    const recent =
        volumes.slice(-5)
        .reduce((a,b)=>a+b,0) / 5;

    const old =
        volumes.slice(-20,-5)
        .reduce((a,b)=>a+b,0) / 15;

    return recent > old;
}

/*
====================================================
MAIN ANALYSIS
====================================================
*/

async function runAnalysis(){

    try{

        log("Fetching live market data...");

        const response = await fetch(
            `https://api.twelvedata.com/time_series?symbol=QQQ&interval=1day&outputsize=200&apikey=${API_KEY}`
        );

        const data = await response.json();

        if(!data.values){

            throw new Error("API unavailable");
        }

        const candles = data.values.reverse();

        const closes =
            candles.map(c=>parseFloat(c.close));

        const highs =
            candles.map(c=>parseFloat(c.high));

        const lows =
            candles.map(c=>parseFloat(c.low));

        const volumes =
            candles.map(c=>parseFloat(c.volume));

        const qqqPrice =
            closes[closes.length - 1];

        const estimatedNDX =
            qqqPrice * 59.5;

        /*
        =================================================
        INDICATORS
        =================================================
        */

        const rsi = RSI(closes);

        const ema20 = EMA(closes.slice(-20),20);

        const ema50 = EMA(closes.slice(-50),50);

        const macd = MACD(closes);

        const atr = ATR(highs,lows,closes);

        const bullishVolume =
            volumeTrend(volumes);

        const volatility =
            (atr / qqqPrice) * 100;

        /*
        =================================================
        SIGNAL ENGINE
        =================================================
        */

        let score = 0;

        /*
        RSI
        */

        if(rsi >= 40 && rsi <= 65){

            score += 20;
        }

        if(rsi < 35){

            score += 10;
        }

        if(rsi > 75){

            score -= 20;
        }

        /*
        EMA TREND
        */

        if(ema20 > ema50){

            score += 30;

        }else{

            score -= 30;
        }

        /*
        MACD
        */

        if(macd > 0){

            score += 25;

        }else{

            score -= 25;
        }

        /*
        VOLUME
        */

        if(bullishVolume){

            score += 15;
        }

        /*
        VOLATILITY FILTER
        */

        if(volatility < 1.5){

            score += 15;

        }else if(volatility > 3){

            score -= 20;
        }

        /*
        =================================================
        TREND DETECTION
        =================================================
        */

        let trend = "SIDEWAYS";

        if(ema20 > ema50 && macd > 0){

            trend = "BULLISH";
        }

        if(ema20 < ema50 && macd < 0){

            trend = "BEARISH";
        }

        /*
        =================================================
        MARKET REGIME
        =================================================
        */

        let marketState = "NORMAL";

        if(volatility < 1){

            marketState = "LOW VOLATILITY TRENDING";
        }

        if(volatility >= 1 && volatility <= 2.5){

            marketState = "MODERATE VOLATILITY";
        }

        if(volatility > 2.5){

            marketState = "HIGH VOLATILITY";
        }

        /*
        =================================================
        SIGNAL
        =================================================
        */

        let signal = "HOLD";

        if(score >= 70){

            signal = "BUY";
        }

        if(score <= -40){

            signal = "SELL";
        }

        /*
        =================================================
        ENTRY / SL / TP
        =================================================
        */

        const entry = qqqPrice;

        const riskDistance = atr * 1.5;

        let sl = entry;
        let tp = entry;

        if(signal === "BUY"){

            sl = entry - riskDistance;

            tp = entry + (riskDistance * 2.5);
        }

        else if(signal === "SELL"){

            sl = entry + riskDistance;

            tp = entry - (riskDistance * 2.5);
        }

        else{

            sl = entry - (riskDistance * 0.5);

            tp = entry + (riskDistance * 0.5);
        }

        /*
        =================================================
        RISK / REWARD
        =================================================
        */

        const risk =
            Math.abs(entry - sl);

        const reward =
            Math.abs(tp - entry);

        const rr =
            (reward / risk).toFixed(2);

        /*
        =================================================
        LEVERAGE ENGINE
        =================================================
        */

        let leverage = "1x";

        if(
            volatility < 1 &&
            trend === "BULLISH"
        ){

            leverage = "3x";
        }

        else if(
            volatility < 2
        ){

            leverage = "2x";
        }

        /*
        =================================================
        CONFIDENCE
        =================================================
        */

        let confidence =
            Math.min(
                Math.max(
                    score + 50,
                    0
                ),
                100
            );

        /*
        =================================================
        UPDATE UI
        =================================================
        */

        qqqPriceEl.innerText =
            qqqPrice.toFixed(2);

        ndxPriceEl.innerText =
            estimatedNDX.toFixed(2);

        rsiValEl.innerText =
            rsi.toFixed(2);

        macdValEl.innerText =
            macd.toFixed(2);

        ema20ValEl.innerText =
            ema20.toFixed(2);

        ema50ValEl.innerText =
            ema50.toFixed(2);

        atrValEl.innerText =
            atr.toFixed(2);

        volumeValEl.innerText =
            bullishVolume ? "BULLISH" : "WEAK";

        volatilityValEl.innerText =
            volatility.toFixed(2) + "%";

        trendValEl.innerText =
            trend;

        scoreValEl.innerText =
            score;

        entryValEl.innerText =
            entry.toFixed(2);

        slValEl.innerText =
            sl.toFixed(2);

        tpValEl.innerText =
            tp.toFixed(2);

        rrValEl.innerText =
            rr + ":1";

        levValEl.innerText =
            leverage;

        marketStateEl.innerText =
            marketState;

        confidenceText.innerText =
            confidence + "%";

        confidenceBar.style.width =
            confidence + "%";

        /*
        =================================================
        SIGNAL COLOR
        =================================================
        */

        signalBox.innerText = signal;

        signalBox.className = "signal";

        if(signal === "BUY"){
            signalBox.classList.add("buy");
        }

        if(signal === "SELL"){
            signalBox.classList.add("sell");
        }

        if(signal === "HOLD"){
            signalBox.classList.add("hold");
        }

        /*
        =================================================
        LOGGING
        =================================================
        */

        log("Analysis completed.");

        log("Signal: " + signal);

        log("Trend: " + trend);

        log("Confidence: " + confidence + "%");

        log("Volatility: " +
            volatility.toFixed(2) + "%");

        log("Recommended leverage: " +
            leverage);

    }

    catch(err){

        log("ERROR: " + err.message);
    }
}

</script>

</body>
