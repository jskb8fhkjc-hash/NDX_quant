<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Quant Dashboard PRO
</title>

<style>

body{

    background:#020617;

    color:white;

    font-family:Arial;

    padding:20px;
}

.container{

    max-width:900px;

    margin:auto;
}

.card{

    background:#0f172a;

    border-radius:16px;

    padding:20px;

    margin-bottom:20px;
}

input{

    width:100%;

    padding:12px;

    border-radius:12px;

    border:none;

    margin-top:10px;

    margin-bottom:10px;

    background:#1e293b;

    color:white;

    font-size:18px;
}

button{

    padding:12px 20px;

    border:none;

    border-radius:12px;

    background:#06b6d4;

    color:white;

    font-weight:bold;

    cursor:pointer;
}

.metric{

    margin-bottom:12px;

    font-size:18px;
}

.signal{

    font-size:36px;

    font-weight:900;
}

.buy{

    color:#22c55e;
}

.sell{

    color:#ef4444;
}

.hold{

    color:#facc15;
}

.log{

    background:black;

    color:#22c55e;

    padding:12px;

    border-radius:12px;

    height:240px;

    overflow:auto;

    font-family:monospace;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>
Quant Dashboard PRO
</h1>

<label>
Instrument ID
</label>

<input
id="instrumentInput"
value="686"
/>

<button onclick="runAnalysis()">

Run Analysis

</button>

</div>

<div class="card">

<h2>
Signal
</h2>

<div
id="signal"
class="signal hold">

WAITING...

</div>

</div>

<div class="card">

<h2>
Market Metrics
</h2>

<div class="metric">
Price:
<span id="price">
--
</span>
</div>

<div class="metric">
EMA20:
<span id="ema20">
--
</span>
</div>

<div class="metric">
EMA50:
<span id="ema50">
--
</span>
</div>

<div class="metric">
RSI:
<span id="rsi">
--
</span>
</div>

<div class="metric">
Volatility:
<span id="volatility">
--
</span>
</div>

<div class="metric">
Risk Score:
<span id="risk">
--
</span>
</div>

<div class="metric">
Confidence:
<span id="confidence">
--
</span>
</div>

</div>

<div class="card">

<h2>
Trade Plan
</h2>

<div class="metric">
Entry:
<span id="entry">
--
</span>
</div>

<div class="metric">
Stop Loss:
<span id="sl">
--
</span>
</div>

<div class="metric">
Take Profit:
<span id="tp">
--
</span>
</div>

</div>

<div class="card">

<h2>
System Log
</h2>

<div
id="logBox"
class="log">

</div>

</div>

</div>

<script>

const logBox =
document.getElementById(
"logBox"
);

function log(message){

    const time =
    new Date()
    .toLocaleTimeString();

    logBox.innerHTML +=
    `<div>[${time}] ${message}</div>`;

    logBox.scrollTop =
    logBox.scrollHeight;
}

async function runAnalysis(){

    try{

        const instrumentId =
        document.getElementById(
        "instrumentInput"
        ).value;

        log(
        `Running analysis for ${instrumentId}`
        );

        const response =
        await fetch(

`/api/market?instrumentId=${instrumentId}`

        );

        const data =
        await response.json();

        console.log(data);

        document
        .getElementById(
        "signal"
        )
        .innerText =
        data.signal;

        document
        .getElementById(
        "signal"
        )
        .className =
        `signal ${data.signal.toLowerCase()}`;

        document
        .getElementById(
        "price"
        )
        .innerText =
        data.price;

        document
        .getElementById(
        "ema20"
        )
        .innerText =
        data.ema20;

        document
        .getElementById(
        "ema50"
        )
        .innerText =
        data.ema50;

        document
        .getElementById(
        "rsi"
        )
        .innerText =
        data.rsi;

        document
        .getElementById(
        "volatility"
        )
        .innerText =
        data.volatility;

        document
        .getElementById(
        "risk"
        )
        .innerText =
        data.riskScore;

        document
        .getElementById(
        "confidence"
        )
        .innerText =
        data.confidence;

        document
        .getElementById(
        "entry"
        )
        .innerText =
        data.entry;

        document
        .getElementById(
        "sl"
        )
        .innerText =
        data.stopLoss;

        document
        .getElementById(
        "tp"
        )
        .innerText =
        data.takeProfit;

        log(
        `Analysis completed`
        );

    }catch(err){

        log(
        err.message
        );
    }
}

</script>

</body>

</html>
